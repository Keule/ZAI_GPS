name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/copilot-setup-steps.yml'
      - '.github/copilot-instructions.md'
      - 'platformio.ini'
      - 'tools/run_test_matrix.py'
      - 'tools/validate_backlog_index.py'
      - 'backlog/index.yaml'

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build/check dependencies
        run: |
          python -m pip install --upgrade pip
          pip install platformio pyyaml

      - name: Validate backlog index
        run: python3 tools/validate_backlog_index.py

      - name: Compile firmware environments
        run: |
          pio run -e T-ETH-Lite-ESP32
          pio run -e T-ETH-Lite-ESP32S3
          pio run -e profile_full_steer_ntrip

      - name: Run host smoke checks
        env:
          SKIP_PROFILE_BUILDS: "1"
        run: python3 tools/run_test_matrix.py
