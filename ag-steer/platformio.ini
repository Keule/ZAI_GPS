; ============================================================================
; AgSteer – Autosteer-Steuergerät für AgOpenGPS / AgIO
; Plattform: LilyGO T-ETH-Lite-S3 (ESP32-S3-WROOM-1 + W5500 Ethernet)
;
; Aufbau:
;   src/        → Firmware-Quellcode (main.cpp, hal/, hal_esp32/, logic/)
;   include/    → Projektweite Header (hardware_pins.h)
;   boards/     → Custom Board-Definition für LilyGO T-ETH-Lite-S3
;
; PIO kompiliert alle .cpp Dateien unter src/ rekursiv.
; Include-Pfad: src/, include/ (automatisch von PlatformIO gesetzt)
;
; W5500 Ethernet:
;   Uses ESP-IDF built-in ETH driver (NOT Arduino Ethernet/Ethernet3 library).
;   Requires Arduino ESP32 Core >= 3.0.0 (default with current espressif32).
;   Reference: https://github.com/Xinyuan-LilyGO/LilyGO-T-ETH-Series
;
; OTA Firmware Update:
;   Custom OTA partition table with factory + dual OTA slots.
;   Firmware can be updated from an SD card at runtime via Update API.
;
; Version Management:
;   auto_version.py reads version.txt before each build and increments
;   the PATCH number (3rd digit) automatically.
;   To change MINOR (2nd digit): edit version.txt manually.
; ============================================================================

[env:lilygo-t-eth-lite-s3]
platform   = espressif32
board      = lilygo_t_eth_lite_s3
board_dir  = boards
framework = arduino

; --- Partition Table ---
; Use custom OTA partition table (factory + ota_0 + ota_1 + spiffs).
; Located at partitions_ota.csv in project root.
board_build.partitions = partitions_ota.csv

; --- Compiler-Optionen ---
; Verwende C++17 statt des Arduino-Standard (C++11)
; BOARD_HAS_PSRAM wird über die Board-Definition (extra_flags) gesetzt
build_unflags = -std=gnu++11
build_flags   =
    -std=gnu++17
    -mfix-esp32-psram-cache-issue
    -DCONFIG_SPIRAM_IGNORE_NOTFOUND=y
    ; FIRMWARE_VERSION is set automatically by auto_version.py

; --- Auto Version ---
; Pre-build script: reads version.txt, increments PATCH, sets -DFIRMWARE_VERSION
; To bump MINOR: edit version.txt manually (e.g. change "0.2.5" to "0.3.0")
extra_scripts = pre:auto_version.py

; --- Serieller Monitor ---
monitor_speed  = 115200
monitor_filters = direct

; --- Bibliotheken ---
; W5500 wird über den ESP-IDF ETH-Treiber angesteuert (<ETH.h>),
; KEINE externe Ethernet-Bibliothek nötig.
; SD-Bibliothek für OTA-Firmware-Update von SD-Karte.
lib_deps       =
    SD

; Ignoriere Arduino Ethernet-Bibliotheken (würden mit ETH.h kollidieren)
lib_ignore     =
    Ethernet
    Ethernet3

; --- Upload ---
upload_speed    = 921600
