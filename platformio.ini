; ============================================================================
; AgSteer - Steering Controller for AgOpenGPS / AgIO
; Platform: LilyGO T-ETH-Lite-S3 (ESP32-S3-WROOM-1 + W5500 Ethernet)
;
; This is the STEERING CONTROLLER firmware. It handles:
;   - ADS1118 steering angle sensor (SPI, FSPI/SPI2_HOST)
;   - BNO085 IMU (SPI)
;   - Hydraulic/electric actuator (SPI)
;   - PID control loop (200 Hz)
;   - W5500 Ethernet/UDP communication with AgIO
;   - SD card OTA firmware update
;
; GNSS/GPS is handled by a SEPARATE device (gps-bridge firmware).
;
; Aufbau:
;   src/        -> Firmware-Quellcode (main.cpp, hal/, hal_esp32/, logic/)
;   include/    -> Projektweite Header (hardware_pins.h)
;   boards/     -> Custom Board-Definition fuer LilyGO T-ETH-Lite-S3
;   lib/        -> Lokale Bibliotheken (ads1118, ETHClass2)
;
; PIO kompiliert alle .cpp Dateien unter src/ rekursiv.
; Include-Pfad: src/, include/ (automatisch von PlatformIO gesetzt)
;
; W5500 Ethernet:
;   Uses ESP-IDF built-in ETH driver (NOT Arduino Ethernet/Ethernet3 library).
;   Requires Arduino ESP32 Core >= 3.0.0 (default with current espressif32).
;   Reference: https://github.com/Xinyuan-LilyGO/LilyGO-T-ETH-Series
;
; OTA Firmware Update:
;   Custom OTA partition table with factory + dual OTA slots.
;   Firmware can be updated from an SD card at runtime via Update API.
;
; Version Management:
;   auto_version.py reads version.txt before each build and increments
;   the PATCH number (3rd digit) automatically.
;   To change MINOR (2nd digit): edit version.txt manually.
; ============================================================================
[platformio]

;! Choose the board to use
; default_envs = T-ETH-Lite-ESP32
default_envs = T-ETH-Lite-ESP32S3


[env]
platform = espressif32
framework = arduino
upload_speed =  921600
monitor_speed = 115200
monitor_filters =
    default
    esp32_exception_decoder

; --- Compiler-Optionen ---
; Verwende C++17 statt des Arduino-Standard (C++11)
; BOARD_HAS_PSRAM wird ueber die Board-Definition (extra_flags) gesetzt
; PSRAM-Konfiguration siehe sdkconfig.defaults
build_unflags = -std=gnu++11
build_flags   =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=1
    ; FIRMWARE_VERSION is set automatically by auto_version.py

; --- Bibliotheken ---
; W5500 wird ueber den ESP-IDF ETH-Treiber angesteuert (<ETH.h>),
; KEINE externe Ethernet-Bibliothek noetig.
; SD-Bibliothek fuer OTA-Firmware-Update von SD-Karte.
lib_deps =
    https://github.com/7semi-solutions/7Semi-BNO08x-9-DOF-Orientation-IMU-Fusion.git
    SD
lib_ignore =
    Ethernet

[env:T-ETH-Lite-ESP32]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -DLILYGO_T_ETH_LITE_ESP32
    -DUSER_SETUP_LOADED
    -include lib/TFT_eSPI/User_Setups/Setup216_LilyGo_ETH_Lite_ESP32.h

; ESP32-S3-WROOM-1 + W5500 FLASH:16MB PSRAM:8MB OPI
[env:T-ETH-Lite-ESP32S3]
board=esp32s3box
build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -DLILYGO_T_ETH_LITE_ESP32S3
    -UARDUINO_USB_CDC_ON_BOOT

; ----------------------------------------------------------------------------
; Beispiel-Buildprofile (S3) fuer modulare Feature-Varianten
; Nutzung:
;   pio run -e profile_comm_only
;   pio run -e profile_sensor_front
;   pio run -e profile_actor_rear
;   pio run -e profile_full_steer
;   pio run -e profile_imu_bringup
;   pio run -e gnss_buildup
; ----------------------------------------------------------------------------

; Profil 1: Nur Kommunikation (ETH/UDP), keine Sensor-/Aktorik-Pipeline.
[env:profile_comm_only]
extends = env:T-ETH-Lite-ESP32S3
build_flags =
    ${env:T-ETH-Lite-ESP32S3.build_flags}
    -DFEAT_PROFILE_COMM_ONLY
    -DFEAT_COMM

; Profil 2: Front-Sensorik aktiv (Lenkwinkelsensor + IMU), keine Aktorik.
[env:profile_sensor_front]
extends = env:T-ETH-Lite-ESP32S3
build_flags =
    ${env:T-ETH-Lite-ESP32S3.build_flags}
    -DFEAT_PROFILE_SENSOR_FRONT
    -DFEAT_COMM
    -DFEAT_STEER_SENSOR
    -DFEAT_IMU

; Profil 3: Rear-Aktorik aktiv (Hydraulik/Elektrik), ohne Front-Sensorik.
[env:profile_actor_rear]
extends = env:T-ETH-Lite-ESP32S3
build_flags =
    ${env:T-ETH-Lite-ESP32S3.build_flags}
    -DFEAT_PROFILE_ACTOR_REAR
    -DFEAT_COMM
    -DFEAT_STEER_ACTOR
    -DFEAT_MACHINE_ACTOR

; Profil 4: Vollausbau Steering (Kommunikation + Sensorik + Aktorik + PID).
[env:profile_full_steer]
extends = env:T-ETH-Lite-ESP32S3
build_flags =
    ${env:T-ETH-Lite-ESP32S3.build_flags}
    -DFEAT_PROFILE_FULL_STEER
    -DFEAT_COMM
    -DFEAT_STEER_SENSOR
    -DFEAT_IMU
    -DFEAT_STEER_ACTOR
    -DFEAT_MACHINE_ACTOR
    -DFEAT_PID_STEER
    -DLOG_IMU_DIAG_INTERVAL_MS=100
    -DLOG_WAS_DIAG_INTERVAL_MS=100
    -DLOG_SPI_TIMING_INTERVAL_MS=1000

; Profil 5: Expliziter IMU-Bringup (nur IMU/SPI Diagnose, keine Aktorik).
[env:profile_imu_bringup]
extends = env:T-ETH-Lite-ESP32S3
build_flags =
    ${env:T-ETH-Lite-ESP32S3.build_flags}
    -DFEAT_PROFILE_SENSOR_FRONT
    -DFEAT_COMM
    -DFEAT_STEER_SENSOR
    -DFEAT_IMU
    -DFEAT_IMU_BRINGUP


; Profil 6: GNSS Bring-up (UART1/2 -> Console Mirror fuer Dual-UM980 Diagnose).
[env:gnss_buildup]
extends = env:T-ETH-Lite-ESP32S3
build_flags =
    ${env:T-ETH-Lite-ESP32S3.build_flags}
    -DFEAT_PROFILE_COMM_ONLY
    -DFEAT_COMM
    -DFEAT_GNSS_UART_MIRROR
    -DGNSS_MIRROR_BAUD=115200
    -DGNSS_MIRROR_UART1_RX_PIN=44
    -DGNSS_MIRROR_UART1_TX_PIN=-1
    -DGNSS_MIRROR_UART2_RX_PIN=2
    -DGNSS_MIRROR_UART2_TX_PIN=-1
    -DFEAT_GNSS
    -DFEAT_GNSS_BUILDUP

; --- Partition Table ---
; Use custom OTA partition table (factory + ota_0 + ota_1 + spiffs).
; Located at partitions_ota.csv in project root.
board_build.partitions = partitions_ota.csv

; --- Auto Version ---
; Pre-build script: reads version.txt, increments PATCH, sets -DFIRMWARE_VERSION
; To bump MINOR: edit version.txt manually (e.g. change "0.2.5" to "0.3.0")
extra_scripts =
    pre:auto_version.py
    pre:tools/patch_7semi_bno.py

; monitor_rts = 1
; monitor_dtr = 1
